name: Build Android APK

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'android/**'
  pull_request:
    paths:
      - 'frontend/**'
      - 'android/**'

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v6

      - name: ☕ Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: 🤖 Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: 🟢 Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: 📦 Install Node dependencies
        working-directory: frontend
        run: npm ci

      - name: 📝 Create .env file
        working-directory: frontend
        run: |
          cat << 'EOF' > .env
          VITE_API_URL=https://api.spectrum.utile.space
          VITE_PUBLIC_URL=https://spectrum.utile.space
          EOF

      - name: 🛠 Build web assets
        working-directory: frontend
        run: npm run build

      - name: 🔄 Sync Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: 🔨 Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: spectrum-debug-apk-${{ github.ref_name == 'main' && 'main' || github.event.pull_request.number }}
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: ${{ github.ref_name == 'main' && 90 || 30 }}
